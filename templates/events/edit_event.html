{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h4 class="mb-0">Modifier l'événement</h4>
                </div>
                <div class="card-body">
                    <form action="{% url 'modifier_evenement' evenement.id %}" method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form_event.as_p }}
                        <div class="mb-3">
                            <label for="id_image" class="form-label">Image (optionnel)</label>
                            <input type="file" class="form-control" name="image" id="id_image" accept="image/*">
                            {% if evenement.image %}
                            <small class="text-muted">Image actuelle : <a href="{{ evenement.image.url }}" target="_blank">voir</a></small>
                            {% endif %}
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'home' %}" class="btn btn-outline-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary">Enregistrer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
