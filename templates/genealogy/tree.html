{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <h2 class="text-center mb-5 fw-bold">Notre Arbre Généalogique</h2>

    <div class="container-fluid mb-4 pt-3 d-flex justify-content-end gap-2">
        <button class="btn btn-primary btn-sm shadow-sm" onclick="exportToPDF()">
            <i class="bi bi-file-pdf me-2"></i>Exporter en PDF
        </button>
        <button class="btn btn-outline-secondary btn-sm shadow-sm" onclick="setTreeZoom(1.1)">
            <i class="bi bi-zoom-in"></i>
        </button>
        <button class="btn btn-outline-secondary btn-sm shadow-sm" onclick="setTreeZoom(0.9)">
            <i class="bi bi-zoom-out"></i>
        </button>
        <button class="btn btn-outline-secondary btn-sm shadow-sm" onclick="resetTreeZoom()">
            <i class="bi bi-arrow-counterclockwise"></i>
        </button>
    </div>

    <!-- Modal d'ajout de membre -->
    <div class="modal fade" id="addMemberModal" tabindex="-1" aria-labelledby="addMemberModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <form method="post" action="{% url 'add_member' %}">
            {% csrf_token %}
            <div class="modal-header">
              <h5 class="modal-title" id="modalTitle">Ajouter un membre</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="related_person_id" name="related_person_id" value="" />
                <input type="hidden" id="relation_type" name="relation_type" value="" />

                <div class="mb-2">
                    <label class="form-label">Prénom</label>
                    <input type="text" class="form-control form-control-sm" name="prenom" required />
                </div>
                <div class="mb-2">
                    <label class="form-label">Nom</label>
                    <input type="text" class="form-control form-control-sm" name="nom" required />
                </div>
                <div class="mb-2">
                    <label class="form-label">Genre</label>
                    <select class="form-select form-select-sm" name="genre" required>
                        <option value="H">Homme</option>
                        <option value="F">Femme</option>
                    </select>
                </div>
                <div class="mb-2">
                    <label class="form-label">Date de naissance</label>
                    <input type="date" class="form-control form-control-sm" name="date_naissance" />
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="est_en_vie" id="est_en_vie" checked />
                    <label class="form-check-label" for="est_en_vie">Est en vie</label>
                </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Fermer</button>
              <button type="submit" class="btn btn-primary btn-sm">Ajouter</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="tree-container">
        <div class="tree">
            <ul>
                {% for node in tree_data %}
                    {% include "genealogy/partials/_tree_node.html" with node=node %}
                {% empty %}
                    <p class="text-center text-muted">Aucune donnée généalogique pour le moment.</p>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>

<style>
    /* CSS de base pour dessiner les lignes de l'arbre */
    .tree-container {
        overflow-x: auto;
        padding: 20px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .tree ul {
        padding-top: 20px; position: relative;
        transition: all 0.5s;
        display: flex;
        justify-content: center;
    }
    .tree li {
        float: left; text-align: center;
        list-style-type: none;
        position: relative;
        padding: 20px 5px 0 5px;
        transition: all 0.5s;
    }
    /* Les connecteurs CSS (Lignes) */
    .tree li::before, .tree li::after {
        content: '';
        position: absolute; top: 0; right: 50%;
        border-top: 2px solid #ccc;
        width: 50%; height: 20px;
    }
    .tree li::after {
        right: auto; left: 50%;
        border-left: 2px solid #ccc;
    }
    .tree li:only-child::after, .tree li:only-child::before { display: none; }
    .tree li:only-child { padding-top: 0; }
    .person-card {
        border: 2px solid #ccc;
        padding: 10px;
        display: inline-block;
        border-radius: 10px;
        background: #f9f9f9;
        min-width: 120px;
    }
    .tree-container {
        overflow: auto;
        padding: 40px;
        background: #fdfdfd;
        border-radius: 20px;
        min-height: auto;
        max-width: none;
        width: 100%;
        display: flex;
        justify-content: center;
    }
    .tree ul {
        padding-top: 20px; position: relative;
        transition: all 0.5s;
        display: flex;
        justify-content: center;
    }
    .tree li {
        text-align: center;
        list-style-type: none;
        position: relative;
        padding: 20px 10px 0 10px;
        transition: all 0.5s;
    }
    /* Connecteurs horizontaux */
    .tree li::before, .tree li::after {
        content: '';
        position: absolute; top: 0; right: 50%;
        border-top: 2px solid #adb5bd;
        width: 50%; height: 20px;
    }
    .tree li::after {
        right: auto; left: 50%;
        border-left: 2px solid #adb5bd;
    }
    /* Connecteurs verticaux pour les parents */
    .tree ul ul::before {
        content: '';
        position: absolute; top: 0; left: 50%;
        border-left: 2px solid #adb5bd;
        width: 0; height: 20px;
    }
    /* Suppression des lignes inutiles pour les enfants uniques ou extrêmes */
    .tree li:only-child::after, .tree li:only-child::before { display: none; }
    .tree li:only-child { padding-top: 0; }
    .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
    .tree li:last-child::before { border-right: 2px solid #adb5bd; border-radius: 0 5px 0 0; }
    .tree li:first-child::after { border-radius: 5px 0 0 0; }

    /* Style des cartes de personnes */
    .person-card {
        border: 1px solid #dee2e6;
        padding: 16px 14px 40px 14px;
        display: inline-block;
        border-radius: 14px;
        background: white;
        width: 230px;
        height: 270px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        transition: transform 0.2s, box-shadow 0.2s;
        z-index: 10;
        position: relative;
        overflow: hidden;
        text-align: center;
    }
    .person-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 27px rgba(0,0,0,0.15);
        border-color: #0d6efd;
    }

    .person-card .avatar-circle {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        border: 2px solid #fff;
        box-shadow: 0 3px 10px rgba(0,0,0,0.12);
        background-position: center;
        background-size: cover;
        margin: 0 auto 10px auto;
        position: relative;
        z-index: 5;
    }
    .person-card .person-name {
        margin-top: 5px;
        font-size: 1rem;
        font-weight: 600;
        color: #212529;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .person-card .person-subtitle {
        font-size: 0.74rem;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: .04em;
        margin-bottom: 6px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .person-card .person-meta {
        font-size: 0.72rem;
        color: #6c757d;
        margin-bottom: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .person-card .action-bar {
        font-size: 0.74rem;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: .04em;
        margin-bottom: 6px;
    }
    .person-card .person-meta {
        font-size: 0.72rem;
        color: #6c757d;
        margin-bottom: 11px;
    }
    .person-card .action-bar {
        border-top: 1px solid #e9ecef;
        position: absolute;
        left: 0;
        right: 0;
        bottom: 8px;
        padding: 6px 0;
        display: flex;
        justify-content: space-around;
        align-items: center;
        background: rgba(255,255,255,0.95);
    }
    /* Couleurs par genre */
    .card-M { border-left: 5px solid #0dcaf0 !important; } /* Homme - Bleu */
    .card-F { border-left: 5px solid #ffc107 !important; } /* Femme - Or/Rose */
    .person-dead { background: #e9ecef !important; border-color: #adb5bd !important; color: #6c757d; opacity: 0.9; }
    .person-dead .fw-bold { color: #495057 !important; }
    .person-dead .text-muted { color: #6c757d !important; }

    @media print {
        .btn, .dropdown, .navbar, .offcanvas, .modal-backdrop, .modal { display: none !important; }
        body { background: white; }
        .tree-container { box-shadow: none; }
        .tree { transform: scale(0.8); transform-origin: top left; }
    }
</style>
<script>
function loadPersonDetails(personId) {
    const content = document.getElementById('details-content');
    content.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
    fetch(`/arbre/details/${personId}/`)
        .then(response => response.text())
        .then(html => {
            content.innerHTML = html;
        })
        .catch(err => {
            content.innerHTML = '<p class="text-danger">Erreur lors du chargement des détails.</p>';
        });
}

let currentZoom = 1.0;
function setTreeZoom(factor) {
    currentZoom *= factor;
    const treeEl = document.querySelector('.tree');
    treeEl.style.transform = `scale(${currentZoom})`;
    treeEl.style.transformOrigin = '50% 0';
    treeEl.scrollIntoView({behavior: 'smooth', block: 'center', inline: 'center'});
}

function resetTreeZoom() {
    currentZoom = 1.0;
    const treeEl = document.querySelector('.tree');
    treeEl.style.transform = 'scale(1)';
    treeEl.style.transformOrigin = '50% 0';
    treeEl.scrollIntoView({behavior: 'smooth', block: 'center', inline: 'center'});
}

function openAddModal(personId, type) {
    const modal = new bootstrap.Modal(document.getElementById('addMemberModal'));
    document.getElementById('related_person_id').value = personId;
    document.getElementById('relation_type').value = type;

    const title = type === 'enfant' ? 'Ajouter un enfant' : 'Ajouter un conjoint';
    document.getElementById('modalTitle').innerText = title;

    modal.show();
}

function exportToPDF() {
    window.print();
}

function confirmDelete(personId){
    if(!confirm('Confirmer la suppression de cette personne ?')) return;
    fetch(`/arbre/delete/${personId}/`, {method:'POST', headers:{'X-CSRFToken': getCookie('csrftoken')}})
      .then(r=>r.json()).then(j=>{ if(j.success){ window.location.reload(); } else{ alert('Erreur suppression'); }});
}

function setPivot(personId) {
    const url = new URL(window.location.href);
    url.searchParams.set('pivot', personId);
    window.location.href = url.toString();
}

function getCookie(name){
    const value=`; ${document.cookie}`;
    const parts=value.split(`; ${name}=`);
    if(parts.length===2)return parts.pop().split(';').shift();
}
</script>
{% endblock %}
